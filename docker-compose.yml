services:
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      # Bind trained weights from your machine (create after training)
      - ./ml/model.weights.h5:/app/model.weights.h5:ro
      - ./ml/class_indices.json:/app/class_indices.json:ro
      - ./ml/disease_info.json:/app/disease_info.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ML_URL: http://ml:8000
      PORT: "3001"
      DATA_DIR: /app/data
    volumes:
      - backend-uploads:/app/uploads
      - backend-history:/app/data
    depends_on:
      ml:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-uploads:
  backend-history:
