# Streamlit Cloud uses this file first (pins Python 3.11 for TensorFlow)
name: marigold
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - streamlit>=1.40.0
      - tensorflow-cpu==2.16.2
      - pillow>=10.0.0,<12.0.0
      - numpy>=1.26.0,<2.0.0
      - protobuf>=3.20,<6
